<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potion Problem 3D Visualizations</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: white;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        .nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 1000;
        }
        .nav-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid black;
            background: white;
            cursor: pointer;
        }
        .nav-dot.active {
            background: black;
        }
        .info {
            position: fixed;
            top: 10px;
            left: 10px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="info">Drag to rotate • Scroll to zoom • Touch supported</div>
    
    <!-- Navigation dots -->
    <div class="nav">
        <div class="nav-dot active" onclick="showVisualization(0)"></div>
        <div class="nav-dot" onclick="showVisualization(1)"></div>
        <div class="nav-dot" onclick="showVisualization(2)"></div>
        <div class="nav-dot" onclick="showVisualization(3)"></div>
    </div>

    <script>
        // Global Three.js variables
        let scene, camera, renderer, controls;
        let currentVisualization = 0;
        let visualizations = [];
        
        // Initialize Three.js
        function init() {
            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);
            
            // Camera setup
            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.PerspectiveCamera(50, aspect, 0.1, 1000);
            camera.position.set(10, 10, 20);
            
            // Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            // Controls setup
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.rotateSpeed = 0.5;
            controls.zoomSpeed = 0.8;
            
            // Create all visualizations
            createVisualization1();
            createVisualization2();
            createVisualization3();
            createVisualization4();
            
            // Show first visualization
            showVisualization(0);
            
            // Animation loop
            animate();
            
            // Handle resize
            window.addEventListener('resize', onWindowResize);
        }
        
        // Visualization 1: The Accumulation Process
        function createVisualization1() {
            const group = new THREE.Group();
            
            // Create base grid
            const gridMaterial = new THREE.LineBasicMaterial({ color: 0x000000, opacity: 0.3, transparent: true });
            const gridGeometry = new THREE.BufferGeometry();
            const gridVertices = [];
            
            // Grid lines
            for (let i = -5; i <= 5; i++) {
                gridVertices.push(-5, 0, i, 5, 0, i);
                gridVertices.push(i, 0, -5, i, 0, 5);
            }
            gridGeometry.setAttribute('position', new THREE.Float32BufferAttribute(gridVertices, 3));
            const grid = new THREE.LineSegments(gridGeometry, gridMaterial);
            group.add(grid);
            
            // Threshold plane
            const planeGeometry = new THREE.PlaneGeometry(10, 10);
            const planeMaterial = new THREE.MeshBasicMaterial({ 
                color: 0x000000, 
                opacity: 0.05, 
                transparent: true,
                side: THREE.DoubleSide
            });
            const plane = new THREE.Mesh(planeGeometry, planeMaterial);
            plane.position.y = 3;
            plane.rotation.x = -Math.PI / 2;
            group.add(plane);
            
            // Threshold plane outline
            const planeOutlineMaterial = new THREE.LineDashedMaterial({ 
                color: 0x000000, 
                dashSize: 0.3, 
                gapSize: 0.1 
            });
            const planeOutlineGeometry = new THREE.EdgesGeometry(planeGeometry);
            const planeOutline = new THREE.LineSegments(planeOutlineGeometry, planeOutlineMaterial);
            planeOutline.position.y = 3;
            planeOutline.rotation.x = -Math.PI / 2;
            planeOutline.computeLineDistances();
            group.add(planeOutline);
            
            // Create bars representing uniform variables
            const barMaterial = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });
            
            // Bar 1: height 0.9
            createBar(group, -3, 0, 0, 0.9, barMaterial);
            
            // Bar 2: height 1.2 (cumulative 2.1)
            createBar(group, -1, 0, 0, 2.1, barMaterial);
            
            // Bar 3: height 1.5 (cumulative 3.6, exceeds threshold)
            const specialBarMaterial = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 3 });
            createBar(group, 1, 0, 0, 3.6, specialBarMaterial);
            
            // Highlight exceeding portion
            const exceedGeometry = new THREE.BufferGeometry();
            exceedGeometry.setAttribute('position', new THREE.Float32BufferAttribute([
                1, 3, 0, 1, 3.6, 0
            ], 3));
            const exceedLine = new THREE.Line(exceedGeometry, new THREE.LineBasicMaterial({ 
                color: 0xff0000, 
                linewidth: 4 
            }));
            group.add(exceedLine);
            
            // Axes
            const axesMaterial = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });
            const axesGeometry = new THREE.BufferGeometry();
            axesGeometry.setAttribute('position', new THREE.Float32BufferAttribute([
                -5, 0, 0, 5, 0, 0,  // X-axis
                0, 0, 0, 0, 5, 0,   // Y-axis
                0, 0, 0, 0, 0, 5    // Z-axis
            ], 3));
            const axes = new THREE.LineSegments(axesGeometry, axesMaterial);
            group.add(axes);
            
            visualizations.push(group);
        }
        
        // Helper function to create 3D bars
        function createBar(group, x, y, z, height, material) {
            const vertices = [
                // Bottom face
                x - 0.4, y, z - 0.4,
                x + 0.4, y, z - 0.4,
                x + 0.4, y, z - 0.4,
                x + 0.4, y, z + 0.4,
                x + 0.4, y, z + 0.4,
                x - 0.4, y, z + 0.4,
                x - 0.4, y, z + 0.4,
                x - 0.4, y, z - 0.4,
                
                // Top face
                x - 0.4, y + height, z - 0.4,
                x + 0.4, y + height, z - 0.4,
                x + 0.4, y + height, z - 0.4,
                x + 0.4, y + height, z + 0.4,
                x + 0.4, y + height, z + 0.4,
                x - 0.4, y + height, z + 0.4,
                x - 0.4, y + height, z + 0.4,
                x - 0.4, y + height, z - 0.4,
                
                // Vertical edges
                x - 0.4, y, z - 0.4,
                x - 0.4, y + height, z - 0.4,
                x + 0.4, y, z - 0.4,
                x + 0.4, y + height, z - 0.4,
                x + 0.4, y, z + 0.4,
                x + 0.4, y + height, z + 0.4,
                x - 0.4, y, z + 0.4,
                x - 0.4, y + height, z + 0.4
            ];
            
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            const bar = new THREE.LineSegments(geometry, material);
            group.add(bar);
        }
        
        // Visualization 2: Probability Mass Function
        function createVisualization2() {
            const group = new THREE.Group();
            
            // Create spiral base
            const spiralMaterial = new THREE.LineBasicMaterial({ color: 0x000000, opacity: 0.3, transparent: true });
            const spiralGeometry = new THREE.BufferGeometry();
            const spiralPoints = [];
            
            for (let t = 0; t < 4 * Math.PI; t += 0.1) {
                const r = t * 0.5;
                spiralPoints.push(new THREE.Vector3(
                    r * Math.cos(t),
                    0,
                    r * Math.sin(t)
                ));
            }
            
            spiralGeometry.setFromPoints(spiralPoints);
            const spiral = new THREE.Line(spiralGeometry, spiralMaterial);
            group.add(spiral);
            
            // PMF bars
            const barMaterial = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });
            
            // Create bars for n = 2 to 10
            const values = [
                { n: 2, p: 1/2, angle: 0 },
                { n: 3, p: 2/6, angle: Math.PI/3 },
                { n: 4, p: 3/24, angle: 2*Math.PI/3 },
                { n: 5, p: 4/120, angle: Math.PI },
                { n: 6, p: 5/720, angle: 4*Math.PI/3 },
                { n: 7, p: 6/5040, angle: 5*Math.PI/3 },
                { n: 8, p: 7/40320, angle: 2*Math.PI },
                { n: 9, p: 8/362880, angle: 7*Math.PI/3 },
                { n: 10, p: 9/3628800, angle: 8*Math.PI/3 }
            ];
            
            values.forEach(({ n, p, angle }) => {
                const r = angle * 0.5;
                const x = r * Math.cos(angle);
                const z = r * Math.sin(angle);
                const height = p * 10; // Scale for visibility
                
                createBar(group, x, 0, z, height, barMaterial);
            });
            
            // e^(-1) envelope curve
            const envelopeMaterial = new THREE.LineDashedMaterial({ 
                color: 0x000000, 
                dashSize: 0.2, 
                gapSize: 0.1 
            });
            const envelopePoints = [];
            
            for (let n = 2; n <= 20; n++) {
                const angle = (n - 2) * Math.PI / 3;
                const r = angle * 0.5;
                const x = r * Math.cos(angle);
                const z = r * Math.sin(angle);
                const height = Math.exp(-1) * Math.pow(n, n-1) / factorial(n) * 10;
                envelopePoints.push(new THREE.Vector3(x, height, z));
            }
            
            const envelopeGeometry = new THREE.BufferGeometry().setFromPoints(envelopePoints);
            const envelope = new THREE.Line(envelopeGeometry, envelopeMaterial);
            envelope.computeLineDistances();
            group.add(envelope);
            
            visualizations.push(group);
        }
        
        // Visualization 3: The Telescoping Series
        function createVisualization3() {
            const group = new THREE.Group();
            
            // Create stack of planes
            const planeMaterial = new THREE.MeshBasicMaterial({ 
                color: 0x000000, 
                opacity: 0.05, 
                transparent: true,
                side: THREE.DoubleSide
            });
            
            const values = [0, 0, 1, 2, 2.5, 2.667, 2.708, 2.7167, 2.7181, 2.71825];
            
            values.forEach((value, index) => {
                // Create plane
                const planeGeometry = new THREE.PlaneGeometry(8, 8);
                const plane = new THREE.Mesh(planeGeometry, planeMaterial.clone());
                plane.material.opacity = 0.02 + index * 0.015;
                plane.position.y = index * 0.8;
                plane.rotation.x = -Math.PI / 2;
                group.add(plane);
                
                // Create plane outline
                const outlineMaterial = new THREE.LineBasicMaterial({ color: 0x000000 });
                const outlineGeometry = new THREE.EdgesGeometry(planeGeometry);
                const outline = new THREE.LineSegments(outlineGeometry, outlineMaterial);
                outline.position.y = index * 0.8;
                outline.rotation.x = -Math.PI / 2;
                group.add(outline);
                
                // Add value indicator
                if (index > 1) {
                    const indicatorGeometry = new THREE.BufferGeometry();
                    indicatorGeometry.setAttribute('position', new THREE.Float32BufferAttribute([
                        4.5, index * 0.8, 0,
                        5 + value * 0.5, index * 0.8, 0
                    ], 3));
                    const indicator = new THREE.Line(indicatorGeometry, outlineMaterial);
                    group.add(indicator);
                }
            });
            
            // Add limiting plane for e
            const ePlaneMaterial = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 3 });
            const ePlaneGeometry = new THREE.EdgesGeometry(new THREE.PlaneGeometry(8, 8));
            const ePlane = new THREE.LineSegments(ePlaneGeometry, ePlaneMaterial);
            ePlane.position.y = 10 * 0.8;
            ePlane.rotation.x = -Math.PI / 2;
            group.add(ePlane);
            
            // Add convergence arrows
            const arrowMaterial = new THREE.LineBasicMaterial({ color: 0x000000 });
            for (let i = 0; i < 8; i++) {
                const arrowGeometry = new THREE.BufferGeometry();
                arrowGeometry.setAttribute('position', new THREE.Float32BufferAttribute([
                    0, i * 0.8 + 0.2, 0,
                    0, (i + 1) * 0.8 - 0.2, 0
                ], 3));
                const arrow = new THREE.Line(arrowGeometry, arrowMaterial);
                group.add(arrow);
                
                // Add arrowhead
                const coneGeometry = new THREE.ConeGeometry(0.1, 0.3, 4);
                const coneMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
                const cone = new THREE.Mesh(coneGeometry, coneMaterial);
                cone.position.set(0, (i + 1) * 0.8 - 0.2, 0);
                cone.rotation.x = Math.PI;
                group.add(cone);
            }
            
            visualizations.push(group);
        }
        
        // Visualization 4: Index Shifting Transformation
        function createVisualization4() {
            const group = new THREE.Group();
            
            // Source grid (left)
            const gridMaterial = new THREE.LineBasicMaterial({ color: 0x000000 });
            const sourceGroup = new THREE.Group();
            sourceGroup.position.x = -5;
            
            // Create source grid
            const sourceGridGeometry = new THREE.BufferGeometry();
            const sourceGridVertices = [];
            for (let i = 0; i <= 5; i++) {
                sourceGridVertices.push(-2, i * 1.5, 0, 2, i * 1.5, 0);
            }
            for (let i = -2; i <= 2; i++) {
                sourceGridVertices.push(i, 0, 0, i, 7.5, 0);
            }
            sourceGridGeometry.setAttribute('position', new THREE.Float32BufferAttribute(sourceGridVertices, 3));
            const sourceGrid = new THREE.LineSegments(sourceGridGeometry, gridMaterial);
            sourceGroup.add(sourceGrid);
            
            // Add source values as points
            const pointMaterial = new THREE.PointsMaterial({ color: 0x000000, size: 0.2 });
            const sourcePoints = [
                { y: 0, value: "0" },
                { y: 1.5, value: "0" },
                { y: 3, value: "1/0!" },
                { y: 4.5, value: "1/1!" },
                { y: 6, value: "1/2!" }
            ];
            
            sourcePoints.forEach(({ y, value }) => {
                const pointGeometry = new THREE.BufferGeometry();
                pointGeometry.setAttribute('position', new THREE.Float32BufferAttribute([0, y, 0], 3));
                const point = new THREE.Points(pointGeometry, pointMaterial);
                sourceGroup.add(point);
            });
            
            group.add(sourceGroup);
            
            // Target grid (right)
            const targetGroup = new THREE.Group();
            targetGroup.position.x = 5;
            
            // Create target grid
            const targetGridGeometry = new THREE.BufferGeometry();
            const targetGridVertices = [];
            for (let i = 0; i <= 4; i++) {
                targetGridVertices.push(-2, i * 1.5 + 1.5, 0, 2, i * 1.5 + 1.5, 0);
            }
            for (let i = -2; i <= 2; i++) {
                targetGridVertices.push(i, 1.5, 0, i, 7.5, 0);
            }
            targetGridGeometry.setAttribute('position', new THREE.Float32BufferAttribute(targetGridVertices, 3));
            const targetGrid = new THREE.LineSegments(targetGridGeometry, gridMaterial);
            targetGroup.add(targetGrid);
            
            // Add target values as points
            const targetPoints = [
                { y: 1.5, value: "1/0!" },
                { y: 3, value: "1/1!" },
                { y: 4.5, value: "1/2!" },
                { y: 6, value: "1/3!" }
            ];
            
            targetPoints.forEach(({ y, value }) => {
                const pointGeometry = new THREE.BufferGeometry();
                pointGeometry.setAttribute('position', new THREE.Float32BufferAttribute([0, y, 0], 3));
                const point = new THREE.Points(pointGeometry, pointMaterial);
                targetGroup.add(point);
            });
            
            group.add(targetGroup);
            
            // Create transformation arrows
            const arrowMaterial = new THREE.LineBasicMaterial({ color: 0x000000 });
            const dashedArrowMaterial = new THREE.LineDashedMaterial({ 
                color: 0x000000, 
                dashSize: 0.3, 
                gapSize: 0.1,
                opacity: 0.5,
                transparent: true
            });
            
            // Arrows showing the mapping
            const mappings = [
                { from: 0, to: null, dashed: true },
                { from: 1.5, to: null, dashed: true },
                { from: 3, to: 1.5, dashed: false },
                { from: 4.5, to: 3, dashed: false },
                { from: 6, to: 4.5, dashed: false }
            ];
            
            mappings.forEach(({ from, to, dashed }) => {
                if (to !== null) {
                    const curve = new THREE.QuadraticBezierCurve3(
                        new THREE.Vector3(-5, from, 0),
                        new THREE.Vector3(0, (from + to) / 2 + 1, 0),
                        new THREE.Vector3(5, to, 0)
                    );
                    
                    const points = curve.getPoints(50);
                    const geometry = new THREE.BufferGeometry().setFromPoints(points);
                    const material = dashed ? dashedArrowMaterial : arrowMaterial;
                    const arrow = new THREE.Line(geometry, material);
                    if (dashed) arrow.computeLineDistances();
                    group.add(arrow);
                    
                    // Add arrowhead
                    if (!dashed) {
                        const coneGeometry = new THREE.ConeGeometry(0.15, 0.4, 4);
                        const coneMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
                        const cone = new THREE.Mesh(coneGeometry, coneMaterial);
                        cone.position.set(5, to, 0);
                        cone.rotation.z = -Math.PI / 2;
                        group.add(cone);
                    }
                }
            });
            
            visualizations.push(group);
        }
        
        // Helper function for factorial
        function factorial(n) {
            if (n <= 1) return 1;
            return n * factorial(n - 1);
        }
        
        // Show specific visualization
        function showVisualization(index) {
            // Clear scene
            while(scene.children.length > 0) {
                scene.remove(scene.children[0]);
            }
            
            // Add selected visualization
            scene.add(visualizations[index]);
            
            // Update navigation
            document.querySelectorAll('.nav-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
            
            // Reset camera position for each visualization
            const positions = [
                { x: 10, y: 10, z: 20 },
                { x: 15, y: 15, z: 25 },
                { x: 12, y: 20, z: 15 },
                { x: 0, y: 10, z: 25 }
            ];
            
            camera.position.set(positions[index].x, positions[index].y, positions[index].z);
            camera.lookAt(0, 0, 0);
            controls.update();
            
            currentVisualization = index;
        }
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        // Handle window resize
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Touch/swipe support
        let touchStartX = 0;
        let touchStartY = 0;
        
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }
        }, { passive: false });
        
        document.addEventListener('touchend', (e) => {
            if (e.changedTouches.length === 1) {
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                
                const deltaX = touchEndX - touchStartX;
                const deltaY = touchEndY - touchStartY;
                
                // Check if horizontal swipe is dominant
                if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 50) {
                    if (deltaX < 0 && currentVisualization < 3) {
                        showVisualization(currentVisualization + 1);
                    } else if (deltaX > 0 && currentVisualization > 0) {
                        showVisualization(currentVisualization - 1);
                    }
                }
            }
        }, { passive: false });
        
        // Initialize on load
        init();
    </script>
</body>
</html>
