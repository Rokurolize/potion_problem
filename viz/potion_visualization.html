<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Potion Problem: E[τ] = e</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0a;
            color: #fafafa;
            overflow: hidden;
            position: relative;
        }
        
        #canvas {
            width: 100vw;
            height: 100vh;
            display: block;
            cursor: grab;
        }
        
        #canvas:active {
            cursor: grabbing;
        }
        
        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 20px;
            max-width: 300px;
            transition: opacity 0.3s;
        }
        
        .controls h1 {
            font-size: 1.2em;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .controls p {
            font-size: 0.9em;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 15px;
        }
        
        .visualization-selector {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .viz-button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85em;
            text-align: left;
        }
        
        .viz-button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
            color: #fff;
        }
        
        .viz-button.active {
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
            color: #fff;
        }
        
        .info-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.85em;
            max-width: 400px;
        }
        
        .value-display {
            color: #4ade80;
            font-weight: bold;
        }
        
        .formula {
            color: #60a5fa;
            margin: 5px 0;
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2em;
            color: rgba(255, 255, 255, 0.6);
        }
        
        @media (max-width: 768px) {
            .controls {
                top: 10px;
                left: 10px;
                padding: 15px;
                max-width: 250px;
            }
            
            .controls h1 {
                font-size: 1em;
            }
            
            .controls p {
                font-size: 0.8em;
            }
            
            .info-panel {
                bottom: 10px;
                right: 10px;
                padding: 10px;
                font-size: 0.75em;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="controls">
        <h1>The Potion Problem</h1>
        <p>E[τ] = e ≈ 2.718281828...</p>
        
        <div class="visualization-selector">
            <button class="viz-button active" data-viz="potion">
                🧪 Potion Simulation
            </button>
            <button class="viz-button" data-viz="simplex">
                🔺 Simplex Volumes
            </button>
            <button class="viz-button" data-viz="pmf">
                📊 Probability Distribution
            </button>
            <button class="viz-button" data-viz="telescoping">
                ∑ Telescoping Series
            </button>
            <button class="viz-button" data-viz="emergence">
                ℮ Emergence of e
            </button>
        </div>
        
        <div id="viz-description">
            <p style="font-size: 0.8em; opacity: 0.8;">
                Watch as uniform random variables accumulate until their sum exceeds 1.
            </p>
        </div>
    </div>
    
    <div class="info-panel" id="info-panel">
        <div>Current sum: <span class="value-display" id="current-sum">0.000</span></div>
        <div>Doses consumed: <span class="value-display" id="doses">0</span></div>
        <div class="formula">P(τ = n) = (n-1)/n!</div>
    </div>
    
    <div class="loading" id="loading">Initializing mathematical engine...</div>

    <script type="module">
        // The PROPER way to build a visualization
        // No external dependencies. Pure mathematics. Pure performance.
        
        class MathematicalEngine {
            constructor() {
                this.e = Math.E;
                this.factorialCache = new Map([[0, 1], [1, 1]]);
                this.pmfCache = new Map();
            }
            
            factorial(n) {
                if (this.factorialCache.has(n)) {
                    return this.factorialCache.get(n);
                }
                let result = this.factorialCache.get(n - 1) * n;
                this.factorialCache.set(n, result);
                return result;
            }
            
            pmf(n) {
                if (n <= 1) return 0;
                if (this.pmfCache.has(n)) {
                    return this.pmfCache.get(n);
                }
                const value = (n - 1) / this.factorial(n);
                this.pmfCache.set(n, value);
                return value;
            }
            
            expectedValue(maxN = 100) {
                let sum = 0;
                for (let n = 2; n <= maxN; n++) {
                    sum += n * this.pmf(n);
                }
                return sum;
            }
            
            simplexVolume(n) {
                return 1 / this.factorial(n);
            }
            
            generateUniform() {
                return Math.random();
            }
            
            simulateHittingTime() {
                let sum = 0;
                let count = 0;
                const values = [];
                
                while (sum < 1) {
                    const value = this.generateUniform();
                    sum += value;
                    count++;
                    values.push(value);
                }
                
                return { count, values, finalSum: sum };
            }
        }
        
        class WebGLRenderer {
            constructor(canvas) {
                this.canvas = canvas;
                this.gl = null;
                this.programs = new Map();
                this.buffers = new Map();
                this.uniforms = new Map();
                this.textures = new Map();
                
                this.init();
            }
            
            init() {
                this.gl = this.canvas.getContext('webgl2', {
                    antialias: true,
                    alpha: false,
                    depth: true,
                    stencil: false,
                    powerPreference: 'high-performance'
                });
                
                if (!this.gl) {
                    throw new Error('WebGL2 not supported. Time to upgrade your browser.');
                }
                
                const gl = this.gl;
                gl.enable(gl.DEPTH_TEST);
                gl.enable(gl.BLEND);
                gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
                
                this.resize();
                window.addEventListener('resize', () => this.resize());
            }
            
            resize() {
                const dpr = window.devicePixelRatio || 1;
                const width = window.innerWidth;
                const height = window.innerHeight;
                
                this.canvas.width = width * dpr;
                this.canvas.height = height * dpr;
                this.canvas.style.width = width + 'px';
                this.canvas.style.height = height + 'px';
                
                this.gl.viewport(0, 0, this.canvas.width, this.canvas.height);
            }
            
            createShader(type, source) {
                const gl = this.gl;
                const shader = gl.createShader(type);
                gl.shaderSource(shader, source);
                gl.compileShader(shader);
                
                if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                    console.error('Shader compilation failed:', gl.getShaderInfoLog(shader));
                    gl.deleteShader(shader);
                    return null;
                }
                
                return shader;
            }
            
            createProgram(vertexSource, fragmentSource) {
                const gl = this.gl;
                const vertexShader = this.createShader(gl.VERTEX_SHADER, vertexSource);
                const fragmentShader = this.createShader(gl.FRAGMENT_SHADER, fragmentSource);
                
                if (!vertexShader || !fragmentShader) return null;
                
                const program = gl.createProgram();
                gl.attachShader(program, vertexShader);
                gl.attachShader(program, fragmentShader);
                gl.linkProgram(program);
                
                if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
                    console.error('Program linking failed:', gl.getProgramInfoLog(program));
                    gl.deleteProgram(program);
                    return null;
                }
                
                return program;
            }
            
            clear(r = 0.04, g = 0.04, b = 0.04, a = 1) {
                const gl = this.gl;
                gl.clearColor(r, g, b, a);
                gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
            }
        }
        
        class PotionVisualization {
            constructor(renderer, mathEngine) {
                this.renderer = renderer;
                this.mathEngine = mathEngine;
                this.gl = renderer.gl;
                
                this.particles = [];
                this.simulation = null;
                this.time = 0;
                
                this.initShaders();
                this.initGeometry();
            }
            
            initShaders() {
                const vertexShader = `#version 300 es
                    precision highp float;
                    
                    in vec3 position;
                    in float value;
                    in float consumed;
                    
                    uniform mat4 projection;
                    uniform mat4 view;
                    uniform float time;
                    
                    out float vValue;
                    out float vConsumed;
                    out float vDepth;
                    
                    void main() {
                        vec3 pos = position;
                        
                        // Animate based on consumption state
                        if (consumed > 0.5) {
                            pos.y += sin(time * 2.0 + position.x * 10.0) * 0.02;
                        }
                        
                        vec4 viewPos = view * vec4(pos, 1.0);
                        gl_Position = projection * viewPos;
                        gl_PointSize = mix(20.0, 30.0, value) / (-viewPos.z);
                        
                        vValue = value;
                        vConsumed = consumed;
                        vDepth = -viewPos.z;
                    }
                `;
                
                const fragmentShader = `#version 300 es
                    precision highp float;
                    
                    in float vValue;
                    in float vConsumed;
                    in float vDepth;
                    
                    out vec4 fragColor;
                    
                    void main() {
                        vec2 coord = gl_PointCoord - vec2(0.5);
                        float dist = length(coord);
                        
                        if (dist > 0.5) discard;
                        
                        float alpha = smoothstep(0.5, 0.3, dist);
                        
                        vec3 color;
                        if (vConsumed > 0.5) {
                            // Consumed potions glow green
                            color = mix(vec3(0.2, 0.8, 0.4), vec3(0.4, 1.0, 0.6), vValue);
                        } else {
                            // Unconsumed potions are blue
                            color = mix(vec3(0.2, 0.4, 0.8), vec3(0.4, 0.6, 1.0), vValue);
                        }
                        
                        // Add glow effect
                        float glow = exp(-dist * 4.0);
                        color += glow * 0.5;
                        
                        fragColor = vec4(color, alpha * 0.9);
                    }
                `;
                
                this.program = this.renderer.createProgram(vertexShader, fragmentShader);
            }
            
            initGeometry() {
                const gl = this.gl;
                
                // Create vertex array object
                this.vao = gl.createVertexArray();
                gl.bindVertexArray(this.vao);
                
                // Position buffer
                this.positionBuffer = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, this.positionBuffer);
                
                const posLoc = gl.getAttribLocation(this.program, 'position');
                gl.enableVertexAttribArray(posLoc);
                gl.vertexAttribPointer(posLoc, 3, gl.FLOAT, false, 0, 0);
                
                // Value buffer
                this.valueBuffer = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, this.valueBuffer);
                
                const valLoc = gl.getAttribLocation(this.program, 'value');
                gl.enableVertexAttribArray(valLoc);
                gl.vertexAttribPointer(valLoc, 1, gl.FLOAT, false, 0, 0);
                
                // Consumed buffer
                this.consumedBuffer = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, this.consumedBuffer);
                
                const conLoc = gl.getAttribLocation(this.program, 'consumed');
                gl.enableVertexAttribArray(conLoc);
                gl.vertexAttribPointer(conLoc, 1, gl.FLOAT, false, 0, 0);
                
                gl.bindVertexArray(null);
            }
            
            startSimulation() {
                this.simulation = this.mathEngine.simulateHittingTime();
                this.particles = [];
                
                let accumX = -2;
                let accumY = 0;
                let totalSum = 0;
                
                this.simulation.values.forEach((value, index) => {
                    totalSum += value;
                    const consumed = totalSum >= 1 ? 1 : 0;
                    
                    this.particles.push({
                        position: [accumX, accumY, 0],
                        value: value,
                        consumed: consumed,
                        targetY: value * 2, // Height represents value
                        index: index
                    });
                    
                    accumX += 0.4;
                    if (accumX > 2) {
                        accumX = -2;
                        accumY -= 0.6;
                    }
                });
                
                this.updateBuffers();
            }
            
            updateBuffers() {
                const gl = this.gl;
                
                const positions = [];
                const values = [];
                const consumed = [];
                
                this.particles.forEach(p => {
                    positions.push(...p.position);
                    values.push(p.value);
                    consumed.push(p.consumed);
                });
                
                gl.bindBuffer(gl.ARRAY_BUFFER, this.positionBuffer);
                gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.DYNAMIC_DRAW);
                
                gl.bindBuffer(gl.ARRAY_BUFFER, this.valueBuffer);
                gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(values), gl.DYNAMIC_DRAW);
                
                gl.bindBuffer(gl.ARRAY_BUFFER, this.consumedBuffer);
                gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(consumed), gl.DYNAMIC_DRAW);
            }
            
            update(deltaTime) {
                this.time += deltaTime;
                
                // Animate particles rising to their target heights
                this.particles.forEach(p => {
                    const targetY = p.consumed > 0 ? p.targetY : 0;
                    p.position[1] += (targetY - p.position[1]) * deltaTime * 3;
                });
                
                this.updateBuffers();
            }
            
            render(projection, view) {
                const gl = this.gl;
                
                gl.useProgram(this.program);
                
                // Set uniforms
                const projLoc = gl.getUniformLocation(this.program, 'projection');
                const viewLoc = gl.getUniformLocation(this.program, 'view');
                const timeLoc = gl.getUniformLocation(this.program, 'time');
                
                gl.uniformMatrix4fv(projLoc, false, projection);
                gl.uniformMatrix4fv(viewLoc, false, view);
                gl.uniform1f(timeLoc, this.time);
                
                // Draw
                gl.bindVertexArray(this.vao);
                gl.drawArrays(gl.POINTS, 0, this.particles.length);
                gl.bindVertexArray(null);
            }
        }
        
        // Additional visualization classes would go here...
        // SimplexVisualization, PMFVisualization, TelescopingVisualization, EmergenceVisualization
        
        class Application {
            constructor() {
                this.canvas = document.getElementById('canvas');
                this.mathEngine = new MathematicalEngine();
                this.renderer = new WebGLRenderer(this.canvas);
                
                this.currentVisualization = null;
                this.visualizations = new Map();
                
                this.camera = {
                    position: [0, 2, 5],
                    target: [0, 0, 0],
                    up: [0, 1, 0],
                    fov: 60,
                    near: 0.1,
                    far: 100
                };
                
                this.mouse = { x: 0, y: 0, down: false };
                this.rotation = { x: 0, y: 0 };
                
                this.init();
            }
            
            async init() {
                // Hide loading
                document.getElementById('loading').style.display = 'none';
                
                // Initialize visualizations
                const potionViz = new PotionVisualization(this.renderer, this.mathEngine);
                potionViz.startSimulation();
                this.visualizations.set('potion', potionViz);
                
                // TODO: Initialize other visualizations
                
                this.currentVisualization = potionViz;
                
                // Setup controls
                this.setupControls();
                this.setupMouseControls();
                
                // Start render loop
                this.lastTime = performance.now();
                this.animate();
            }
            
            setupControls() {
                const buttons = document.querySelectorAll('.viz-button');
                buttons.forEach(button => {
                    button.addEventListener('click', (e) => {
                        const vizType = e.target.dataset.viz;
                        this.switchVisualization(vizType);
                        
                        // Update active state
                        buttons.forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                    });
                });
            }
            
            setupMouseControls() {
                this.canvas.addEventListener('mousedown', (e) => {
                    this.mouse.down = true;
                    this.mouse.x = e.clientX;
                    this.mouse.y = e.clientY;
                });
                
                this.canvas.addEventListener('mousemove', (e) => {
                    if (!this.mouse.down) return;
                    
                    const dx = e.clientX - this.mouse.x;
                    const dy = e.clientY - this.mouse.y;
                    
                    this.rotation.x += dy * 0.01;
                    this.rotation.y += dx * 0.01;
                    
                    this.mouse.x = e.clientX;
                    this.mouse.y = e.clientY;
                });
                
                this.canvas.addEventListener('mouseup', () => {
                    this.mouse.down = false;
                });
                
                this.canvas.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const zoom = e.deltaY * 0.001;
                    this.camera.position[2] = Math.max(2, Math.min(20, this.camera.position[2] + zoom));
                });
            }
            
            switchVisualization(type) {
                const viz = this.visualizations.get(type);
                if (viz) {
                    this.currentVisualization = viz;
                    
                    // Update description
                    const descriptions = {
                        'potion': 'Watch as uniform random variables accumulate until their sum exceeds 1.',
                        'simplex': 'Explore the n-dimensional simplexes whose volumes equal 1/n!',
                        'pmf': 'The probability mass function P(τ = n) = (n-1)/n!',
                        'telescoping': 'See how the expectation series telescopes to e.',
                        'emergence': 'Witness the emergence of e from pure randomness.'
                    };
                    
                    document.getElementById('viz-description').innerHTML = 
                        `<p style="font-size: 0.8em; opacity: 0.8;">${descriptions[type]}</p>`;
                }
            }
            
            updateCamera() {
                // Rotate camera around origin
                const dist = Math.sqrt(
                    this.camera.position[0] ** 2 + 
                    this.camera.position[2] ** 2
                );
                
                this.camera.position[0] = Math.sin(this.rotation.y) * dist;
                this.camera.position[2] = Math.cos(this.rotation.y) * dist;
                this.camera.position[1] = 2 + Math.sin(this.rotation.x) * 3;
            }
            
            getProjectionMatrix() {
                const aspect = this.canvas.width / this.canvas.height;
                const fov = this.camera.fov * Math.PI / 180;
                const near = this.camera.near;
                const far = this.camera.far;
                
                const f = 1 / Math.tan(fov / 2);
                const rangeInv = 1 / (near - far);
                
                return new Float32Array([
                    f / aspect, 0, 0, 0,
                    0, f, 0, 0,
                    0, 0, (near + far) * rangeInv, -1,
                    0, 0, near * far * rangeInv * 2, 0
                ]);
            }
            
            getViewMatrix() {
                // Simple look-at matrix
                const eye = this.camera.position;
                const target = this.camera.target;
                const up = this.camera.up;
                
                const zAxis = normalize(subtract(eye, target));
                const xAxis = normalize(cross(up, zAxis));
                const yAxis = cross(zAxis, xAxis);
                
                return new Float32Array([
                    xAxis[0], yAxis[0], zAxis[0], 0,
                    xAxis[1], yAxis[1], zAxis[1], 0,
                    xAxis[2], yAxis[2], zAxis[2], 0,
                    -dot(xAxis, eye), -dot(yAxis, eye), -dot(zAxis, eye), 1
                ]);
            }
            
            animate() {
                const currentTime = performance.now();
                const deltaTime = (currentTime - this.lastTime) / 1000;
                this.lastTime = currentTime;
                
                // Update
                this.updateCamera();
                if (this.currentVisualization) {
                    this.currentVisualization.update(deltaTime);
                }
                
                // Render
                this.renderer.clear();
                
                const projection = this.getProjectionMatrix();
                const view = this.getViewMatrix();
                
                if (this.currentVisualization) {
                    this.currentVisualization.render(projection, view);
                }
                
                // Update info panel
                if (this.currentVisualization === this.visualizations.get('potion')) {
                    const sim = this.currentVisualization.simulation;
                    if (sim) {
                        document.getElementById('current-sum').textContent = 
                            sim.finalSum.toFixed(3);
                        document.getElementById('doses').textContent = sim.count;
                    }
                }
                
                requestAnimationFrame(() => this.animate());
            }
        }
        
        // Vector math utilities (because we don't need a library for this)
        function subtract(a, b) {
            return [a[0] - b[0], a[1] - b[1], a[2] - b[2]];
        }
        
        function cross(a, b) {
            return [
                a[1] * b[2] - a[2] * b[1],
                a[2] * b[0] - a[0] * b[2],
                a[0] * b[1] - a[1] * b[0]
            ];
        }
        
        function dot(a, b) {
            return a[0] * b[0] + a[1] * b[1] + a[2] * b[2];
        }
        
        function normalize(v) {
            const len = Math.sqrt(v[0] * v[0] + v[1] * v[1] + v[2] * v[2]);
            return [v[0] / len, v[1] / len, v[2] / len];
        }
        
        // Initialize application
        window.addEventListener('DOMContentLoaded', () => {
            new Application();
        });
    </script>
</body>
</html>
