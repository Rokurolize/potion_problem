<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive visualization of the Potion Problem: How E[τ] = e emerges from randomness">
    <meta name="author" content="Linus Torvalds">
    <title>The Potion Problem | E[τ] = e</title>
    
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: rgba(10, 10, 10, 0.9);
            --text-primary: #fafafa;
            --text-secondary: rgba(250, 250, 250, 0.8);
            --accent-green: #4ade80;
            --accent-blue: #60a5fa;
            --accent-orange: #fb923c;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            position: relative;
            user-select: none;
        }
        
        #canvas {
            width: 100vw;
            height: 100vh;
            display: block;
            cursor: grab;
            touch-action: none;
        }
        
        #canvas:active {
            cursor: grabbing;
        }
        
        /* Main UI Panel */
        .ui-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 320px;
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, opacity 0.3s ease;
            z-index: 100;
        }
        
        .ui-panel.hidden {
            transform: translateX(-380px);
            opacity: 0;
        }
        
        .ui-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .ui-title {
            font-size: 1.4em;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }
        
        .ui-subtitle {
            font-size: 0.9em;
            color: var(--text-secondary);
            margin-top: 4px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', monospace;
        }
        
        /* Visualization Selector */
        .viz-selector {
            display: grid;
            gap: 8px;
            margin-bottom: 24px;
        }
        
        .viz-button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9em;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }
        
        .viz-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: width 0.3s ease;
        }
        
        .viz-button:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
            transform: translateX(2px);
        }
        
        .viz-button:hover::before {
            width: 100%;
        }
        
        .viz-button.active {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent-blue);
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .viz-icon {
            font-size: 1.2em;
            width: 24px;
            text-align: center;
        }
        
        /* Info Display */
        .info-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .info-label {
            font-size: 0.8em;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }
        
        .info-value {
            font-size: 1.1em;
            color: var(--accent-green);
            font-weight: 600;
            font-family: 'SF Mono', Monaco, monospace;
        }
        
        .formula {
            font-family: 'SF Mono', Monaco, monospace;
            color: var(--accent-blue);
            background: rgba(96, 165, 250, 0.1);
            padding: 8px 12px;
            border-radius: 4px;
            margin: 8px 0;
            font-size: 0.9em;
            border: 1px solid rgba(96, 165, 250, 0.2);
        }
        
        /* Controls */
        .controls-section {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }
        
        .control-group {
            margin-bottom: 16px;
        }
        
        .control-label {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: block;
        }
        
        .slider {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: var(--accent-blue);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        
        .slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--accent-blue);
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }
        
        /* Performance Stats */
        .stats {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px 16px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 0.75em;
            color: var(--text-secondary);
            display: grid;
            gap: 4px;
        }
        
        .stat-line {
            display: flex;
            justify-content: space-between;
            gap: 16px;
        }
        
        .stat-value {
            color: var(--accent-green);
        }
        
        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }
        
        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-content {
            text-align: center;
        }
        
        .loading-title {
            font-size: 2em;
            font-weight: 300;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        
        .loading-subtitle {
            font-size: 1.2em;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        
        .loading-bar {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1px;
            overflow: hidden;
            position: relative;
        }
        
        .loading-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: var(--accent-blue);
            animation: loading 1s ease-in-out infinite;
        }
        
        @keyframes loading {
            0% { width: 0; left: 0; }
            50% { width: 100%; left: 0; }
            100% { width: 0; left: 100%; }
        }
        
        /* Mobile UI Toggle */
        .ui-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 48px;
            height: 48px;
            background: var(--bg-secondary);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 101;
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            .ui-panel {
                width: calc(100vw - 40px);
                max-width: 400px;
            }
            
            .ui-toggle {
                display: flex;
            }
            
            .ui-panel:not(.hidden) + .ui-toggle {
                opacity: 0;
                pointer-events: none;
            }
        }
        
        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        
        /* High Contrast Mode */
        @media (prefers-contrast: high) {
            :root {
                --bg-primary: #000;
                --text-primary: #fff;
                --border-color: #fff;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loading">
        <div class="loading-content">
            <h1 class="loading-title">The Potion Problem</h1>
            <p class="loading-subtitle">E[τ] = e</p>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>
    </div>

    <!-- Main Canvas -->
    <canvas id="canvas"></canvas>
    
    <!-- UI Panel -->
    <div class="ui-panel" id="ui-panel">
        <div class="ui-header">
            <div>
                <h1 class="ui-title">The Potion Problem</h1>
                <p class="ui-subtitle">E[τ] = e ≈ 2.718281828...</p>
            </div>
        </div>
        
        <div class="viz-selector">
            <button class="viz-button active" data-viz="potion">
                <span class="viz-icon">🧪</span>
                <div>
                    <div>Potion Simulation</div>
                    <div style="font-size: 0.8em; opacity: 0.7;">Monte Carlo hitting time</div>
                </div>
            </button>
            <button class="viz-button" data-viz="simplex">
                <span class="viz-icon">🔺</span>
                <div>
                    <div>Simplex Volumes</div>
                    <div style="font-size: 0.8em; opacity: 0.7;">Geometric interpretation</div>
                </div>
            </button>
            <button class="viz-button" data-viz="pmf">
                <span class="viz-icon">📊</span>
                <div>
                    <div>PMF Landscape</div>
                    <div style="font-size: 0.8em; opacity: 0.7;">P(τ = n) = (n-1)/n!</div>
                </div>
            </button>
            <button class="viz-button" data-viz="telescoping">
                <span class="viz-icon">∑</span>
                <div>
                    <div>Telescoping Series</div>
                    <div style="font-size: 0.8em; opacity: 0.7;">Series transformation</div>
                </div>
            </button>
            <button class="viz-button" data-viz="emergence">
                <span class="viz-icon">℮</span>
                <div>
                    <div>Emergence of e</div>
                    <div style="font-size: 0.8em; opacity: 0.7;">Convergence visualization</div>
                </div>
            </button>
        </div>
        
        <div id="viz-info">
            <!-- Dynamic content based on visualization -->
        </div>
        
        <div class="controls-section" id="controls">
            <!-- Dynamic controls based on visualization -->
        </div>
    </div>
    
    <!-- Mobile UI Toggle -->
    <div class="ui-toggle" id="ui-toggle">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </div>
    
    <!-- Performance Stats -->
    <div class="stats" id="stats">
        <div class="stat-line">
            <span>FPS</span>
            <span class="stat-value" id="fps">60</span>
        </div>
        <div class="stat-line">
            <span>Draw Calls</span>
            <span class="stat-value" id="draw-calls">0</span>
        </div>
        <div class="stat-line">
            <span>Triangles</span>
            <span class="stat-value" id="triangles">0</span>
        </div>
    </div>
    
    <!-- Main Application Script -->
    <script type="module" src="/src/visualization/App.ts"></script>
</body>
</html>
